<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Salle de Conférence</title>
</head>
<body>
  <header class="bg-primary text-white text-center py-3">
    <img src="img/logo.png" alt="Logo" class="logo">
    <h2 id="welcomeMessage"></h2>
  </header>

  <div class="container-fluid d-flex flex-column vh-100">
    <div class="row">
 <!-- Participants à gauche -->
<div class="col-md-2">
  <div class="participants-list">
    <h2>Participants</h2>
    <ul class="list-group border p-2 mb-3" style="height: 400px; width:240px; overflow-y: scroll;" id="participants-list">
      <!-- Les noms des participants seront ajoutés ici -->
    </ul>
  </div>
</div>
      <!-- Vidéo au centre -->
      <div class="col-md-8 d-flex flex-column align-items-center" style="height: 500px; overflow-y: scroll;">
        <div class="options-container text-center mb-3">
          <button class="btn btn-info" id="shareScreen"><i class="fas fa-desktop"></i></button>
          <button class="btn btn-primary" id="inviteParticipant"><i class="fas fa-user-plus"></i></button>
          <button id="toggleFullScreen" class="btn btn-secondary"><i class="fas fa-expand"></i></button>
        </div>
        <div class="video-container flex-grow-1 d-flex justify-content-center align-items-center">
          <div id="video-grid" class="border w-100 h-100"></div>
        </div>
        <div class="text-center mt-3">
          <button id="muteButton" class="btn btn-warning"><i class="fas fa-microphone"></i></button>
          <button id="videoButton" class="btn btn-danger"><i class="fas fa-video"></i></button>
          <button id="endCallButton" class="btn btn-dark"><i class="fas fa-phone-slash"></i></button>
        </div>
      </div>
      
      <!-- Chat à droite -->
      <div class="col-md-2">
        <div class="chat-container">
          <h2>Chat</h2>
          <div id="chat-box" class="border p-2 mb-3" style="height: 400px; overflow-y: scroll;">
            <!-- Les messages du chat seront ajoutés ici -->
          </div>
          <form id="chat-form">
            <input type="text" id="chat-input" class="form-control" placeholder="Tapez un message..." autocomplete="on">
            <button type="submit" class="btn btn-primary mt-2">Envoyer</button>
          </form>
        </div>
      </div>
    </div>
  </div>

 <!--scripts--> 
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="script.js"></script>
</body>
