<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Visiotech Conférence</title>
</head>
<body>
  <header class="bg-primary text-white text-center py-3">
    <div class="container d-flex justify-content-between align-items-center">
      <img src="img/logo.png" alt="Logo" class="logo">
      <h1>Visiotech Conférence</h1>
    
      <!-- Bouton de déconnexion aligné à gauche -->
      <button id="logoutButton" class="btn btn-danger">Déconnexion</button>
    </div>
  </header>
  
  <div class="container mt-5 text-center">
    <h2 id="welcomeMessage"></h2>
  </div>

  <main class="container mt-5">
    <h1 class="text-center">Créer une Salle de Conférence</h1>
    <form id="createRoomForm" class="mb-4">
      <div class="form-group">
        <input type="text" class="form-control" id="roomName" placeholder="Nom de la salle" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Créer la Salle</button>
    </form>

    <h1 class="text-center">Rejoindre une Salle de Conférence</h1>
    <form id="joinRoomForm">
      <div class="form-group">
        <input type="text" class="form-control" id="roomCode" placeholder="Code de la salle" required>
      </div>
      <button type="submit" class="btn btn-success btn-block">Rejoindre la Salle</button>
    </form>
  </main>

  <!-- Scripts -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
